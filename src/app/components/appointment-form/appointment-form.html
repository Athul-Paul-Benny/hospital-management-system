<div class="container mt-4">
  <h2>Book Appointment</h2>

  <form [formGroup]="appointmentForm" (ngSubmit)="onSubmit()">
    
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-control" formControlName="patientName">
    </div>

    <div class="mb-3">
      <label class="form-label">Phone</label>
      <input type="text" class="form-control" formControlName="patientPhone">
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" formControlName="patientEmail">
    </div>

    <div class="mb-3">
      <label class="form-label">Address</label>
      <input type="text" class="form-control" formControlName="patientAddress">
    </div>

    <div class="mb-3">
      <label class="form-label">City</label>
      <input type="text" class="form-control" formControlName="patientCity">
    </div>

    <div class="mb-3">
      <label class="form-label">Gender</label>
      <select class="form-select" formControlName="patientGender">
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Doctor</label>
      <select class="form-select" formControlName="doctorId" (change)="onDoctorChange()">
        <option value="">Select Doctor</option>
        <option *ngFor="let doctor of doctors" [value]="doctor.id">
          {{ doctor.name }} - {{ doctor.specialization }}
        </option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Available Slot</label>
      <select class="form-select" formControlName="scheduleSlotId">
        <option value="">Select Slot</option>
        <option *ngFor="let slot of availableSlots" [value]="slot.id">
          {{ slot.date | date:'fullDate' }} - {{ slot.time }}
        </option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Reason</label>
      <textarea class="form-control" rows="3" formControlName="reason"></textarea>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="appointmentForm.invalid">
      Book Appointment
    </button>
  </form>

  <div *ngIf="showSuccessMessage" class="alert alert-success mt-3">
    Appointment booked successfully.
  </div>
</div>
